<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <!-- data-mode and data-running are updated by main.js -->
    <div id="app" data-mode="work">
        <!-- Work / Pause mode switch -->
        <div class="mode-switch" id="mode-switch" role="group" aria-label="Timer mode">
            <button type="button" class="mode-switch__option" data-mode="work" aria-pressed="true">Work</button>
            <button type="button" class="mode-switch__option" data-mode="pause" aria-pressed="false">Pause</button>
            <span class="mode-switch__thumb" aria-hidden="true"></span>
        </div>

        <!-- Minutes duration picker (track built by JS) -->
        <section class="minutes-picker" aria-label="Set duration in minutes">
            <p class="minutes-picker__label">Set duration in minutes</p>
            <div class="minutes-picker__frame">
                <div class="minutes-picker__viewport" id="minutes-viewport">
                    <div class="minutes-picker__track" id="minutes-track"></div>
                </div>
                <div class="minutes-picker__indicator" aria-hidden="true"></div>
            </div>
        </section>

        <!-- Countdown timer + controls -->
        <main class="timer">
            <div class="timer__display-wrapper">
                <time id="time-display" class="timer__display" datetime="PT25M">25:00</time>
            </div>

            <div class="timer__controls">
                <button id="start-pause-btn" class="timer__btn timer__btn--primary" type="button">Start</button>
                <button id="reset-btn" class="timer__btn timer__btn--secondary" type="button">Reset</button>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
