<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="app" data-mode="work">
        <main class="timer">
            <header class="timer__header">
                <p id="mode-indicator" class="timer__mode">Work</p>
            </header>

            <div class="timer__display-wrapper">
                <time id="time-display" class="timer__display" datetime="PT25M">25:00</time>
            </div>

            <div class="timer__controls">
                <button id="start-pause-btn" class="timer__btn timer__btn--primary" type="button">Start</button>
                <button id="reset-btn" class="timer__btn timer__btn--secondary" type="button">Reset</button>
            </div>
        </main>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
